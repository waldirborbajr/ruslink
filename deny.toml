# deny.toml
# Configuration for cargo-deny (security, licensing, bans, etc.)

[graph]
# Only analyze dependencies for the platforms we care about
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
# exclude-dev = true        # Uncomment to ignore dev-dependencies

# =============================================================================
# Advisories (Security vulnerabilities + unmaintained crates)
# =============================================================================
[advisories]
# How to handle unmaintained crates
unmaintained = "workspace"     # Only error on direct dependencies (recommended)
unsound = "workspace"          # Same for unsound crates
# yanked = "deny"              # Uncomment if you want to ban yanked versions

# Ignore specific advisories (add RUSTSEC IDs when you accept the risk)
ignore = [
    # "RUSTSEC-202x-xxxxx",
]

# =============================================================================
# Bans (forbidden crates, multiple versions, wildcards)
# =============================================================================
[bans]
multiple-versions = "deny"
wildcards = "deny"

# Explicitly ban problematic crates
deny = [
    # { crate = "openssl", use-instead = "rustls" },
    # { crate = "git2", use-instead = "gix" },
]

# Temporary exceptions
skip = [
    # { crate = "some-crate@0.1", reason = "temporary" },
]

skip-tree = [
    # { crate = "windows-sys", reason = "foundational crate that updates very frequently" },
]

# =============================================================================
# Sources (where dependencies come from)
# =============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"

# =============================================================================
# Licenses
# =============================================================================
[licenses]
confidence-threshold = 0.93

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # "Unlicense",          # Only if you're comfortable with it
]

unused-allowed-license = "warn"

exceptions = [
    # Example for crates with special licenses:
    # { crate = "ring", allow = ["MIT", "ISC", "OpenSSL"] },
]

# Ignore license checks for private/unpublished workspace crates
[licenses.private]
ignore = true
