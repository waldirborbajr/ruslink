# deny.toml
# Configuration for cargo-deny

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true
# exclude-dev = true

# =============================================================================
# Advisories
# =============================================================================
[advisories]
unmaintained = "workspace"
unsound = "workspace"
# yanked = "deny"

ignore = [
    # Add RUSTSEC IDs here when you accept the risk
]

# =============================================================================
# Bans
# =============================================================================
[bans]
multiple-versions = "deny"
wildcards = "deny"

# Allow multiple versions of windows-sys (very common situation)
skip-tree = [
    { crate = "windows-sys", reason = "Multiple versions are common in Windows ecosystem crates" },
]

# =============================================================================
# Sources
# =============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "deny"

# =============================================================================
# Licenses
# =============================================================================
[licenses]
confidence-threshold = 0.93

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",                    # ← Added for colored crate
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

unused-allowed-license = "warn"

exceptions = [
    # Add exceptions here if needed for specific crates
    # { crate = "ring", allow = ["MIT", "ISC", "OpenSSL"] },
]

[licenses.private]
ignore = true
