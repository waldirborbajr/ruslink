[package]
name = "ruslink"
version = "0.3.0"
edition = "2021"
description = "A fast, modern Rust implementation of GNU Stow with built-in Git support"
authors = ["Waldir Borba Junior <wborbajr@gmail.com>"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/waldirborbaje/ruslink"
readme = "README.md"
keywords = ["ruslink", "symlink", "cli", "terminal", "rust"]


[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
regex = "1.11"
chrono = { version = "0.4", features = ["clock"] }
colored = "2.1"
anyhow = "1.0"           # Para error handling mais limpo
dirs = "5.0"             # Para encontrar ~/.config etc.

[dev-dependencies]
tempfile = "3.0"