name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: ruslink ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            **ruslink** ${{ steps.get_version.outputs.version }}
            
            A fast, modern Rust implementation of GNU Stow with built-in Git support.

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (for aarch64)
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-latest' && !matrix.use-cross
        run: strip "target/${{ matrix.target }}/release/ruslink"

      - name: Archive + Generate SHA256
        shell: bash
        run: |
          cd "target/${{ matrix.target }}/release"
          ARTIFACT="ruslink-${{ needs.release.outputs.version }}-${{ matrix.target }}"
          
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a -y "../../${ARTIFACT}.zip" ruslink.exe
            cd ../../
            sha256sum "${ARTIFACT}.zip" > "${ARTIFACT}.zip.sha256"
          else
            tar czf "../../${ARTIFACT}.tar.gz" ruslink
            cd ../../
            sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          files: |
            ruslink-${{ needs.release.outputs.version }}-${{ matrix.target }}.tar.gz
            ruslink-${{ needs.release.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
            ruslink-${{ needs.release.outputs.version }}-${{ matrix.target }}.zip
            ruslink-${{ needs.release.outputs.version }}-${{ matrix.target }}.zip.sha256
