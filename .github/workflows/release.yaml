name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  # REMOVE: 'release: created' é redundante — push na tag já cobre isso
  # e gera double-trigger quando a release é criada manualmente

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always

# FIX: permissions: write-all no job é excessivo; manter apenas o necessário no topo
permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: get_version
        uses: battila7/get-version-action@v2

      # FIX: actions/create-release@v1 está arquivado/deprecated
      # Substituído por softprops/action-gh-release que é mantido ativamente
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ruslink ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            **ruslink** ${{ steps.get_version.outputs.version }}

            A modern Rust reimplementation of GNU Stow with Git support.

  build-unix:
    name: Build ${{ matrix.job.os }} (${{ matrix.job.target }})
    runs-on: ${{ matrix.job.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, use-cross: true }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      # FIX: actions-rs/cargo@v1 está arquivado/deprecated
      # Substituído por cargo direto com cross instalado via taiki-e/install-action
      - name: Install cross
        if: matrix.job.use-cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.job.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.job.target }}
          else
            cargo build --release --locked --target ${{ matrix.job.target }}
          fi

      # FIX: strip no aarch64 cross-compilado requer strip do toolchain correto
      - name: Strip binary
        if: matrix.job.os == 'ubuntu-latest' && matrix.job.use-cross != true
        run: strip "target/${{ matrix.job.target }}/release/ruslink"

      - name: Archive
        run: |
          cd target/${{ matrix.job.target }}/release
          tar czf ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.tar.gz ruslink

      # FIX: actions/upload-release-asset@v1 está arquivado/deprecated
      # Substituído por softprops/action-gh-release@v2 que faz upload incremental
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.release_version }}
          files: target/${{ matrix.job.target }}/release/ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.tar.gz

  build-windows:
    name: Build Windows (${{ matrix.job.target }})
    runs-on: windows-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc }
          - { target: i686-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      # FIX: actions-rs/cargo@v1 arquivado → cargo direto
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.job.target }}

      - name: Archive
        run: |
          cd target/${{ matrix.job.target }}/release
          7z a -y ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.zip ruslink.exe

      # FIX: actions/upload-release-asset@v1 arquivado → softprops/action-gh-release@v2
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.release_version }}
          files: target/${{ matrix.job.target }}/release/ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.zip
