name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  release:
    types: [created]

env:
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always

permissions:
  packages: write
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions: write-all
    outputs:
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Get release version
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: ruslink ${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          body: |
            **ruslink** ${{ steps.get_version.outputs.version }}

            A modern Rust reimplementation of GNU Stow with Git support.

  build-unix:
    name: Build ${{ matrix.job.os }} (${{ matrix.job.target }})
    runs-on: ${{ matrix.job.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,   target: aarch64-unknown-linux-gnu, use-cross: true }
          - { os: macos-latest,    target: x86_64-apple-darwin }
          - { os: macos-latest,    target: aarch64-apple-darwin }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          use-cross: ${{ matrix.job.use-cross }}
          command: build
          args: --release --locked --target ${{ matrix.job.target }}

      - name: Strip binary
        if: matrix.job.os == 'ubuntu-latest'
        run: strip "target/${{ matrix.job.target }}/release/ruslink"

      - name: Archive
        run: |
          cd target/${{ matrix.job.target }}/release
          tar czf ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.tar.gz ruslink

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.release_upload_url }}
          asset_path: target/${{ matrix.job.target }}/release/ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.tar.gz
          asset_name: ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.tar.gz
          asset_content_type: application/gzip

  build-windows:
    name: Build Windows (${{ matrix.job.target }})
    runs-on: windows-latest
    needs: release
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc }
          - { target: i686-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --locked --target ${{ matrix.job.target }}

      - name: Archive
        run: |
          cd target/${{ matrix.job.target }}/release
          7z a -y ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.zip ruslink.exe

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.release_upload_url }}
          asset_path: target/${{ matrix.job.target }}/release/ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.zip
          asset_name: ruslink-${{ needs.release.outputs.release_version }}-${{ matrix.job.target }}.zip
          asset_content_type: application/zip