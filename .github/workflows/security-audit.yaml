name: Security Audit

on:
  push:
    branches: [main, master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
      - ".github/workflows/rust-ci.yaml"  # opcional: se quiser que mudança no CI dispare

  pull_request:
    branches: [main, master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yaml"

  # Verificação diária automática (boa prática)
  # schedule:
  #   - cron: '0 3 * * *'  # todo dia às 03:00 UTC

permissions:
  contents: read
  issues: write        # para criar issues em caso de vulnerabilidades
  checks: write        # para relatar status no PR

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  audit:
    name: Security Audit (cargo-audit + cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: security-audit

      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      # ==================== cargo audit ====================
      - name: Audit dependencies (cargo-audit)
        run: cargo audit --all-features --ignore-until 2026-12-31
        continue-on-error: true  # Não quebrar CI por advisory novo (pode ser falso positivo temporário)
        id: audit

      # ==================== cargo deny ====================
      - name: Check with cargo-deny
        run: cargo deny check --all-features
        continue-on-error: false

      # ==================== Report Issues ====================
      - name: Create Issue on vulnerability
        if: failure() && github.event_name == 'push' && steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY || '/tmp/audit.log', 'utf8') || 'Cargo audit failed';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security Vulnerability Detected in Dependencies`,
              body: `**Cargo audit encontrou vulnerabilidades.**\n\n` +
                    `Branch: \`${context.ref}\`\n` +
                    `Commit: ${context.sha}\n\n` +
                    '```\n' + output + '\n```',
              labels: ['security', 'vulnerability']
            });
