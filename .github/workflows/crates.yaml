name: Publish to crates.io

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # FIX: rustfmt e clippy removidos — o CI já valida isso antes da release
      # Evita retrabalho desnecessário no pipeline de publicação

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # FIX: testes removidos — já cobertos pelo CI antes da release chegar aqui
      # Manter apenas o que é específico do processo de publicação

      - name: Dry-run publish
        run: cargo publish --dry-run

      # FIX: 'cargo login' expõe o token no log do runner
      # '--token' passa direto para o publish sem logar
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
